apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: devops-daily-netpol
  namespace: devops-daily
spec:
  podSelector:
    matchLabels:
      app: devops-daily
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
