apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-daily-backend
  namespace: devops-daily
  labels:
    app: devops-daily-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-daily-backend
  template:
    metadata:
      labels:
        app: devops-daily-backend
    spec:
      containers:
        - name: backend
          image: lithwing/devops-daily-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: anthropic-secret
                  key: ANTHROPIC_API_KEY
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: devops-daily-backend
  namespace: devops-daily
spec:
  selector:
    app: devops-daily-backend
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
