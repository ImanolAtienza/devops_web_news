apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-daily
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ImanolAtienza/devops_web_news
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: devops-daily
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
